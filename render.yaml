services:
  - type: web
    name: plfog
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --run-syncdb
    startCommand: gunicorn plfog.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        sync: false
        previewValue: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
        previewValue: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
        previewValue: "https://*.onrender.com"
      - key: EMAIL_BACKEND
        sync: false
        previewValue: "django.core.mail.backends.console.EmailBackend"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: WEBPUSH_VAPID_PUBLIC_KEY
        sync: false
        previewValue: "preview-placeholder"
      - key: WEBPUSH_VAPID_PRIVATE_KEY
        sync: false
        previewValue: "preview-placeholder"
      - key: WEBPUSH_VAPID_ADMIN_EMAIL
        sync: false
        previewValue: "preview@example.com"
      - key: SENTRY_DSN
        sync: false

    # Preview environments for pull requests
    previews:
      generation: automatic

  # Nightly Airtable → Django sync (pulls AT changes into the database)
  # Requires env vars: DATABASE_URL, DJANGO_SECRET_KEY, AIRTABLE_API_TOKEN,
  # AIRTABLE_BASE_ID, AIRTABLE_SYNC_ENABLED=true (set in Render dashboard)
  - type: cron
    name: airtable-pull
    runtime: python
    schedule: "0 10 * * *"
    buildCommand: pip install -r requirements.txt
    command: python manage.py airtable_pull
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
