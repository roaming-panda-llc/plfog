{% extends "base.html" %}
{% block title %}Already Voted{% endblock %}

{% block content %}
<div class="voting-card">
    <h2>You've already voted, {{ member.display_name }}</h2>
    <p>Your votes for {{ session.name }}:</p>
    <ul class="voting-vote-list">
        <li><strong>1st:</strong> {{ votes.1st }}</li>
        <li><strong>2nd:</strong> {{ votes.2nd }}</li>
        <li><strong>3rd:</strong> {{ votes.3rd }}</li>
    </ul>
</div>
{% endblock %}
