{% extends "base.html" %}
{% block title %}Email Results{% endblock %}

{% block content %}
<div class="voting-card">
    <h2>Email Results: {{ session.name }}</h2>

    <table class="voting-results-table">
        <thead>
            <tr><th>Guild</th><th>Disbursement</th></tr>
        </thead>
        <tbody>
            {% for r in results.results %}
            <tr><td>{{ r.guild_name }}</td><td>${{ r.disbursement|floatformat:2 }}</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}
        <div class="voting-form-group">
            <label for="recipients">Recipient emails (comma-separated)</label>
            <input type="text" name="recipients" id="recipients" placeholder="sushuma@pastlives.space, morlock@pastlives.space">
        </div>
        <button type="submit" class="voting-btn voting-btn-primary">Send Results Email</button>
        <a href="{% url 'voting_dashboard' %}" class="voting-btn voting-btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
