<div id="changelog-modal" class="changelog-overlay" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
    <div class="changelog-modal">
        <div class="changelog-modal__header">
            <h2 class="changelog-modal__title">Changelog</h2>
            <button class="changelog-modal__close" onclick="document.getElementById('changelog-modal').style.display='none'" aria-label="Close changelog">&times;</button>
        </div>
        <div class="changelog-modal__body">
            {% for entry in changelog %}
            <div class="changelog-entry">
                <div class="changelog-entry__header">
                    <span class="changelog-entry__version">v{{ entry.version }}</span>
                    <span class="changelog-entry__date">{{ entry.date }}</span>
                </div>
                <h3 class="changelog-entry__title">{{ entry.title }}</h3>
                <ul class="changelog-entry__list">
                    {% for change in entry.changes %}
                    <li>{{ change }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
