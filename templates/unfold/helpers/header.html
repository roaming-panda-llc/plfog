{% load static unfold %}

<header class="pl-topbar">
    <button class="pl-topbar__toggle"
            @click="sidebarDesktopOpen = !sidebarDesktopOpen; localStorage.setItem('sidebarDesktopOpen', sidebarDesktopOpen ? '1' : '0')"
            aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
        </svg>
    </button>
    <span class="pl-topbar__divider"></span>
    <span class="pl-badge--beta">BETA</span>
    <span class="pl-topbar__divider"></span>
    <a href="{% url 'hub_guild_voting' %}" class="pl-view-switcher" title="Switch to Member View">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Member View
    </a>
    <div class="pl-topbar__spacer"></div>
    <button class="pl-topbar__theme-toggle"
            x-data="{ light: localStorage.getItem('theme') === 'light' }"
            @click="light = !light; window.__plSetTheme(light)"
            aria-label="Toggle theme">
        <svg x-show="!light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg x-show="light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>
    <div class="pl-profile" x-data="{ open: false }">
        <button class="pl-profile__avatar"
                @click="open = !open"
                :aria-expanded="open"
                @keydown.escape.window="if (open) { open = false; $el.focus() }"
                aria-label="User menu">
            {{ user.get_full_name.0|default:user.email.0|upper }}
        </button>
        <div class="pl-profile__dropdown"
             x-show="open"
             x-transition
             @click.away="open = false"
             role="menu">
            <div class="pl-profile__dropdown-header">
                <div class="pl-profile__dropdown-name">{{ user.get_full_name|default:user.get_username }}</div>
                {% if user.email %}
                    <div class="pl-profile__dropdown-email">{{ user.email }}</div>
                {% endif %}
            </div>
            <a href="{% url 'hub_profile_settings' %}" class="pl-profile__dropdown-item" role="menuitem">Profile</a>
            <a href="{% url 'hub_email_preferences' %}" class="pl-profile__dropdown-item" role="menuitem">Email Preferences</a>
            <div class="pl-profile__dropdown-divider"></div>
            <form method="post" action="{% url 'admin:logout' %}">
                {% csrf_token %}
                <button type="submit" class="pl-profile__dropdown-item pl-profile__dropdown-item--danger" role="menuitem">Log Out</button>
            </form>
        </div>
    </div>
</header>
