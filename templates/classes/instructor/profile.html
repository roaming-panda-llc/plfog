{% extends "classes/instructor/base.html" %}
{% block tab_content %}
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        {% include "components/form_field.html" with field=field %}
    {% endfor %}
    <div style="margin-top:1rem;">
        <button class="hub-btn hub-btn--sm hub-btn--primary" type="submit">Save Profile</button>
    </div>
</form>
{% endblock %}
