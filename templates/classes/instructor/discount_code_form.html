{% extends "classes/instructor/base.html" %}
{% block tab_content %}
<h2 style="margin-top:0;">{% if mode == 'create' %}New Discount Code{% else %}Edit “{{ code.code }}”{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}{% include "components/form_field.html" with field=field %}{% endfor %}
    <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
        <button class="hub-btn hub-btn--sm hub-btn--primary" type="submit">Save</button>
        <a class="hub-btn hub-btn--sm hub-btn--ghost" href="{% url 'classes:instructor_discount_codes' %}">Cancel</a>
    </div>
</form>
{% endblock %}
