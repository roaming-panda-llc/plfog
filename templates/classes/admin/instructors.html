{% extends "classes/admin/base.html" %}
{% block tab_content %}
<div style="display:flex; justify-content:flex-end; margin-bottom:1rem;">
    <a class="hub-btn hub-btn--primary" href="{% url 'classes:admin_instructor_invite' %}">+ Invite Instructor</a>
</div>
<table style="width:100%; border-collapse:collapse;">
    <thead>
        <tr style="border-bottom:2px solid var(--hub-border);">
            <th style="text-align:left; padding:0.5rem 0.75rem; font-weight:600;">Name</th>
            <th style="text-align:left; padding:0.5rem 0.75rem; font-weight:600;">Email</th>
            <th style="text-align:left; padding:0.5rem 0.75rem; font-weight:600;">Classes</th>
            <th style="text-align:left; padding:0.5rem 0.75rem; font-weight:600;">Active</th>
        </tr>
    </thead>
    <tbody>
    {% for i in instructors %}
        <tr style="border-bottom:1px solid var(--hub-border);">
            <td style="padding:0.5rem 0.75rem;">{{ i.display_name }}</td>
            <td style="padding:0.5rem 0.75rem;">{{ i.user.email }}</td>
            <td style="padding:0.5rem 0.75rem;">{{ i.classes.count }}</td>
            <td style="padding:0.5rem 0.75rem;">{{ i.is_active|yesno }}</td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="4" style="padding:1.5rem 0.75rem; color:var(--hub-text-muted);">No instructors yet.</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
