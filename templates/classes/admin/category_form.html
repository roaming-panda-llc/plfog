{% extends "classes/admin/base.html" %}
{% block tab_content %}
<h2>{% if mode == 'create' %}New Category{% else %}Edit: {{ category.name }}{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        {% include "components/form_field.html" with field=field %}
    {% endfor %}
    <button type="submit" class="hub-btn hub-btn--primary">Save</button>
    <a href="{% url 'classes:admin_categories' %}" class="hub-btn">Cancel</a>
</form>
<script>
(function() {
    const source = document.querySelector('[name="name"]');
    const slug = document.querySelector('[name="slug"]');
    if (!source || !slug) return;
    let touched = slug.value.trim() !== '';
    slug.addEventListener('input', () => { touched = true; });
    source.addEventListener('input', () => {
        if (touched) return;
        slug.value = source.value.toLowerCase().trim()
            .replace(/[^\w\s-]/g, '')
            .replace(/[\s_-]+/g, '-')
            .replace(/^-+|-+$/g, '');
    });
})();
</script>
{% endblock %}
