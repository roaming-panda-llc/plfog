{% extends "classes/admin/base.html" %}
{% block tab_content %}
<h2>{% if mode == 'create' %}New Category{% else %}Edit: {{ category.name }}{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        {% include "components/form_field.html" with field=field %}
    {% endfor %}
    <button type="submit" class="hub-btn hub-btn--primary">Save</button>
    <a href="{% url 'classes:admin_categories' %}" class="hub-btn">Cancel</a>
</form>
{% endblock %}
