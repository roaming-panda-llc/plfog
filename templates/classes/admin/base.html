{% extends "hub/base.html" %}
{% load hub_tags %}

{% block title %}Classes Admin — {{ active_tab|title }}{% endblock %}

{% block content %}
<div class="hub-card">
    <h1>Classes</h1>
    <nav style="display: flex; border-bottom: 1px solid var(--hub-border); gap: 0; margin-bottom: 1.25rem; flex-wrap: wrap;" role="tablist">
        <a href="{% url 'classes:admin_classes' %}" class="vote-tab{% if active_tab == 'classes' %} vote-tab--active{% endif %}">Classes</a>
        <a href="{% url 'classes:admin_categories' %}" class="vote-tab{% if active_tab == 'categories' %} vote-tab--active{% endif %}">Categories</a>
        <a href="{% url 'classes:admin_instructors' %}" class="vote-tab{% if active_tab == 'instructors' %} vote-tab--active{% endif %}">Instructors</a>
        <a href="{% url 'classes:admin_registrations' %}" class="vote-tab{% if active_tab == 'registrations' %} vote-tab--active{% endif %}">Registrations</a>
        <a href="{% url 'classes:admin_discount_codes' %}" class="vote-tab{% if active_tab == 'discount_codes' %} vote-tab--active{% endif %}">Discount Codes</a>
        <a href="{% url 'classes:admin_settings' %}" class="vote-tab{% if active_tab == 'settings' %} vote-tab--active{% endif %}">Settings</a>
    </nav>
    {% block tab_content %}{% endblock %}
</div>
{% endblock %}
