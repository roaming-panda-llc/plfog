{% extends "classes/admin/base.html" %}
{% block tab_content %}
<h2>Class Settings</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}{% include "components/form_field.html" with field=field %}{% endfor %}
    <div style="margin-top:1.5rem;">
        <button type="submit" class="hub-btn hub-btn--primary">Save Settings</button>
    </div>
</form>
{% endblock %}
