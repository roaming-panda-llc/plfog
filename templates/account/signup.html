{% extends "base.html" %}

{% block title %}Sign Up - Past Lives{% endblock %}

{% block content %}
<div class="auth-page">
    <h1 class="auth-page__title">Join the Community</h1>
    <p class="auth-page__subtitle">Create your Past Lives account</p>
    <div class="auth-card">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn--primary btn--full">Sign Up</button>
        </form>
        <div class="auth-links">
            <p>Already have an account? <a href="{% url 'account_login' %}">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
