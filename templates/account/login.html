{% extends "base.html" %}

{% block title %}Log In - Past Lives{% endblock %}

{% block content %}
<div class="auth-page">
    <h1 class="auth-page__title">Welcome Back</h1>
    <p class="auth-page__subtitle">Enter your email to receive a login code</p>
    <div class="auth-card">
        <form method="POST" action="{% url 'account_request_login_code' %}">
            {% csrf_token %}
            <label for="id_email">Email address</label>
            <input type="email" name="email" id="id_email" required autofocus placeholder="you@example.com">
            <button type="submit" class="btn btn--primary btn--full">Send Login Code</button>
        </form>
        <div class="auth-links">
            <p>Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
