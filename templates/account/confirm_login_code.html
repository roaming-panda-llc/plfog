{% extends "base.html" %}

{% block title %}Enter Login Code - Past Lives{% endblock %}

{% block content %}
<div class="auth-page">
    <h1 class="auth-page__title">Check Your Email</h1>
    <p class="auth-page__subtitle">We sent a 6-digit code to your email address. Enter it below to log in.</p>
    <div class="auth-card">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn--primary btn--full">Verify Code</button>
        </form>
        <div class="auth-links">
            <p><a href="{% url 'account_request_login_code' %}">Didn't receive a code? Try again</a></p>
        </div>
    </div>
</div>
{% endblock %}
