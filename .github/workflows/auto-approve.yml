name: Bot Approve on AI Review

# Trigger when a pull request review is submitted
on:
  pull_request_review:
    types: [submitted]

jobs:
  bot-approve:
    runs-on: ubuntu-latest

    # Only run for known AI reviewer bots — never for our own bot or humans
    if: >-
      contains(fromJSON('["github-copilot[bot]","coderabbitai[bot]","cursor-bot[bot]"]'), github.event.review.user.login)
      && github.event.review.state == 'commented'

    steps:
      - name: Log review details
        run: |
          echo "Review by: ${{ github.event.review.user.login }}"
          echo "Review state: ${{ github.event.review.state }}"
          echo "PR #${{ github.event.pull_request.number }}"

      - name: Check review body for issues
        id: check
        env:
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          echo "--- AI Review Body ---"
          echo "$REVIEW_BODY"
          echo "---"

          # Reject if the AI reviewer flagged concerns
          if echo "$REVIEW_BODY" | grep -qiE '(security|vulnerability|bug|critical|error|issue found|concern)'; then
            echo "approve=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AI reviewer flagged concerns — skipping auto-approve"
          else
            echo "approve=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR via Bot account
        if: steps.check.outputs.approve == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            -f event='APPROVE' \
            -f body='Automatically approved — AI review by ${{ github.event.review.user.login }} passed with no concerns flagged.'

      - name: Post warning comment if not approved
        if: steps.check.outputs.approve == 'false'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body='⚠️ **Auto-approve skipped** — ${{ github.event.review.user.login }} flagged potential concerns in this PR. A human reviewer should take a look.'
