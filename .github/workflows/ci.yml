name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: sqlite:///db.sqlite3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Django checks
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: pytest --tb=short

      - name: Run mutation tests
        continue-on-error: true
        run: pytest --leela --target core --target hub --target membership --target plfog

  lint:
    runs-on: ubuntu-latest
    env:
      CI: true
      DJANGO_SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: sqlite:///db.sqlite3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy plfog/ core/ membership/ hub/

      - name: No inline <style> in template extra_head blocks
        run: python scripts/check_no_inline_style_in_extra_head.py
